<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" aria-labelledby="logoTitle logoDesc" role="img">
  <title id="logoTitle">CCUS Policy Hub Logo</title>
  <desc id="logoDesc">A professional logo with a pulsing blue CCUS badge and Policy Hub text.</desc>
  <defs>
    <!-- Premium Gradient -->
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <!-- Professional Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feFlood flood-color="#60a5fa" flood-opacity="0.6" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="softGlow" />
      <feMerge>
        <feMergeNode in="softGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.08); }
      }
      .pulse-layer {
        animation: pulseGlow 3s ease-in-out infinite;
        transform-origin: 27px 20px;
      }
      .logo-text {
        fill: #0f172a; /* Slate 900 default */
      }
      @media (prefers-color-scheme: dark) {
        .logo-text {
          fill: #f8fafc; /* Slate 50 for dark mode */
        }
      }
    </style>
  </defs>
  
  <!-- Pulse Effect (Animated Layer) -->
  <rect class="pulse-layer" x="4" y="7.5" width="48" height="25" rx="5" fill="#60a5fa" opacity="0.3" filter="url(#glow)" />
  
  <!-- Badge Group -->
  <g>
    <!-- Main Badge Body -->
    <rect x="5" y="8" width="46" height="24" rx="4" fill="url(#badgeGradient)" />
    <!-- CCUS Text: Increased font size for better balance -->
    <text x="28" y="24.5" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13.5" font-weight="900" fill="white" style="letter-spacing: 0.02em;">CCUS</text>
  </g>
  
  <!-- Policy Hub Text: Slightly reduced font size to not overpower CCUS -->
  <text x="60" y="25.5" class="logo-text" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="17.5" font-weight="900" style="letter-spacing: -0.03em;">Policy Hub</text>
</svg>
