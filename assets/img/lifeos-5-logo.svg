<svg width="450" height="240" viewBox="0 0 450 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="neuralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>

  <!-- LIFEOS Foundation -->
  <text x="40" y="160" font-family="monospace, sans-serif" font-weight="900" font-size="64" fill="#1e293b" letter-spacing="4">
    LIFEOS
  </text>

  <!-- Connectivity -->
  <path d="M285 135C300 120 320 100 340 90" stroke="#6366f1" stroke-width="4" stroke-dasharray="10 5" opacity="0.4" />

  <!-- Neural 5 -->
  <path d="M400 90C380 85 320 80 300 90C280 100 295 130 300 150C305 170 380 140 400 160C420 180 410 230 380 250C350 270 290 260 270 230" 
        stroke="url(#neuralGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" 
        transform="translate(10, -30)" />

  <path d="M395 95C370 92 310 85 290 92C275 105 282 135 285 155C288 175 355 155 375 175C395 195 385 235 365 255" 
        stroke="#8b5cf6" stroke-width="3" stroke-dasharray="10 5" opacity="0.3" 
        transform="translate(10, -30)" />

  <circle cx="310" cy="60" r="5" fill="#fff" filter="url(#glow)" />
  <circle cx="310" cy="120" r="4" fill="#fff" opacity="0.8" />
  <circle cx="405" cy="135" r="6" fill="#ec4899" filter="url(#glow)" />

  <circle cx="380" cy="50" r="1.5" fill="#6366f1" opacity="0.3" />
  <circle cx="280" cy="210" r="2" fill="#8b5cf6" opacity="0.2" />
</svg>
